name: ci

# CI gates that must pass before any merge to main. Two pieces:
#
#   flake-check: per-system `nix flake check` (treefmt, lib-tests,
#                cli-tests). lib-tests gate at eval time; cli-tests
#                and treefmt are built derivations.
#
#   e2e-smoke:   end-to-end CLI exercise against the synthetic flake
#                under tests/synthetic/. The smoke test locks nixpkgs
#                and cannot run in the Nix flake-check sandbox (which
#                is why it is gated separately).
#
# Matrix coverage:
#   x86_64-linux   (ubuntu-latest)   - primary; full check + e2e
#   x86_64-darwin  (macos-13)        - flake-check only
#   aarch64-darwin (macos-14)        - flake-check + e2e (BSD userland)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  flake-check:
    name: flake check (${{ matrix.system }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: macos-13
            system: x86_64-darwin
          - runner: macos-14
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: nix flake check
        # No --no-build: the cli-tests (bats) and treefmt checks are
        # derivations and only run when built.
        run: nix flake check --print-build-logs

  e2e-smoke:
    name: e2e smoke (${{ matrix.system }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          # Darwin e2e catches BSD-vs-GNU userland breakage (mktemp,
          # realpath) that flake-check cannot see.
          - runner: macos-14
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    needs: flake-check
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - name: run e2e smoke
        # tests/synthetic/flake.lock is committed; no lock step here.
        run: bash tests/smoke/e2e.sh
